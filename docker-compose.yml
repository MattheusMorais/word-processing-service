services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create-table.sql:/docker-entrypoint-initdb.d/create-table.sql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: word_processing_service
    restart: always

    stdin_open: true
    tty: true

    depends_on:
       db:
          condition: service_healthy

    ports:
       - "${APP_PORT}:8080"

    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 5432

volumes:
  postgres_data:

